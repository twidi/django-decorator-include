name: build

on:
  - pull_request
  - push

jobs:
  build:
    name: ${{ matrix.toxenv }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - python: 3.8
            toxenv: py38-django22
          - python: 3.9
            toxenv: py39-django22
          - python: 3.8
            toxenv: py38-django30
          - python: 3.9
            toxenv: py39-django30
          - python: 3.8
            toxenv: py38-django31
          - python: 3.9
            toxenv: py39-django31
          - python: 3.8
            toxenv: py38-django32
          - python: 3.9
            toxenv: py39-django32
          - python: "3.10"
            toxenv: py310-django32
          - python: 3.8
            toxenv: py38-django40
          - python: 3.8
            toxenv: py38-django40
          - python: "3.10"
            toxenv: py310-django40
          - python: 3.8
            toxenv: py38-django41
          - python: 3.9
            toxenv: py39-django41
          - python: "3.10"
            toxenv: py310-django41
          - python: "3.11"
            toxenv: py311-django41
          - python: "3.10"
            toxenv: py310-django42
          - python: "3.10"
            toxenv: py310-django50
          - python: "3.10"
            toxenv: py310-django51
          - python: "3.10"
            toxenv: py310-django52
          - python: "3.11"
            toxenv: py311-django42
          - python: "3.11"
            toxenv: py311-django50
          - python: "3.11"
            toxenv: py311-django51
          - python: "3.11"
            toxenv: py311-django52
          - python: "3.12"
            toxenv: py312-django42
          - python: "3.12"
            toxenv: py312-django50
          - python: "3.12"
            toxenv: py312-django51
          - python: "3.12"
            toxenv: py312-django52
          - python: "3.12"
            toxenv: py312-django60
          - python: "3.12"
            toxenv: py312-django61
          - python: "3.13"
            toxenv: py313-django50
          - python: "3.13"
            toxenv: py313-django51
          - python: "3.13"
            toxenv: py313-django52
          - python: "3.13"
            toxenv: py313-django60
          - python: "3.13"
            toxenv: py313-django61
          - python: "3.14"
            toxenv: py314-django51
          - python: "3.14"
            toxenv: py314-django52
          - python: "3.14"
            toxenv: py314-django60
          - python: "3.14"
            toxenv: py314-django61
          - python: "3.15"
            toxenv: py314-django52
            allow-failure: true
          - python: "3.15"
            toxenv: py314-django60
            allow-failure: true
          - python: "3.15"
            toxenv: py314-django61
            allow-failure: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Upgrade packaging tools on Python 3.15
        if: matrix.python-version == '3.15'
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install tox
        run: python -m pip install tox

      - name: Run tox
        run: tox -e ${{ matrix.toxenv }}
